environment:
  name: calm-indoor-yard
  gravity_mps2: 9.80665
  time_step_s: 0.02
  duration_s: 180

demo:
  seed: 42
  duration_s: 30
  output_path: outputs/simulation_demo.jsonl

sensors:
  imu:
    update_rate_hz: 100
    accel_noise_std: 0.03
    gyro_noise_std: 0.002
    accel_bias_mps2: [0.01, -0.015, 0.005]
    gyro_bias_rad_s: 0.0005
  gps:
    update_rate_hz: 5
    position_noise_std_m: 0.4
    dropout_probability: 0.08
  barometer:
    update_rate_hz: 20
    altitude_noise_std_m: 0.08
    drift_mps: 0.002

perception:
  update_rate_hz: 10
  detection_range_m: 12.0
  position_noise_std_m: 0.15
  objects:
    - id: obstacle-box-1
      type: obstacle
      position_m: [5.0, 2.5, 1.5]
    - id: landing-pad
      type: target
      position_m: [8.0, 6.0, 0.0]

planning:
  grid:
    width_m: 12.0
    height_m: 10.0
    resolution_m: 0.5
    origin_m: [0.0, 0.0]
  inflation_radius_m: 0.5
  obstacles:
    - id: obstacle-box-1
      center_m: [5.0, 2.5]
      size_m: [1.0, 1.0]

disturbances:
  wind:
    mean_mps: [0.4, 0.0, 0.0]
    gust_std_mps: 0.15
